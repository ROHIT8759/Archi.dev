<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8A2BE2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Hexagon shape -->
  <path d="M16 2 L26 8 L26 16 L26 24 L16 30 L6 24 L6 16 L6 8 Z" 
        stroke="url(#logo-gradient)" 
        stroke-width="2" 
        fill="none" 
        filter="url(#glow)"/>
  
  <!-- Inner circle -->
  <circle cx="16" cy="16" r="4" fill="#00F0FF" opacity="0.9"/>
  
  <!-- Connection lines -->
  <line x1="16" y1="2" x2="16" y2="12" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  <line x1="26" y1="8" x2="20" y2="12" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  <line x1="26" y1="24" x2="20" y2="20" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  <line x1="16" y1="30" x2="16" y2="20" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  <line x1="6" y1="24" x2="12" y2="20" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
  <line x1="6" y1="8" x2="12" y2="12" stroke="#00F0FF" stroke-width="1" opacity="0.4"/>
</svg>
